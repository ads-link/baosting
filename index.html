<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Xác nhận tiếp tục</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f1f3f5;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      padding-top: 110px;
    }

    .wrapper {
      width: 90%;
      max-width: 330px;
    }

    .notice {
      margin-bottom: 14px;
      padding: 14px 18px;
      border-radius: 8px;
      background: #fff3cd;
      color: #846400;
      font-size: 14px;
      line-height: 1.4;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
    }

    .verify-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 82px;
      padding: 14px 16px;
      border: 1px solid #d1d1d1;
      background: #ffffff;
      box-shadow: 0 3px 7px rgba(0, 0, 0, 0.16);
    }

    .check-area {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }

    .checkbox {
      width: 29px;
      height: 29px;
      border: 2px solid #777;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s ease;
    }

    .checkbox.checked {
      border-color: #2f74e8;
      background: #2f74e8;
    }

    .checkbox.checked::after {
      content: "✓";
      color: white;
      font-size: 22px;
      font-weight: bold;
    }

    .check-text {
      color: #222;
      font-size: 14px;
      line-height: 1.35;
    }

    .status {
      width: 64px;
      text-align: center;
      color: #777;
      font-size: 11px;
      line-height: 1.3;
    }

    .status-icon {
      margin: 0 auto 5px;
      width: 31px;
      height: 31px;
      border: 4px solid #2f74e8;
      border-top-color: transparent;
      border-radius: 50%;
    }

    .status-icon.loading {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .message {
      margin-top: 15px;
      color: #666;
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 480px) {
      body {
        padding-top: 70px;
      }
    }
  </style>
</head>

<body>

  <main class="wrapper">

    <div class="notice">
      Bạn đang vào kênh Bảo Sting.<br>
                  Xác nhận bên dưới!
    </div>

    <div class="verify-box">

      <div id="checkArea" class="check-area">
        <div id="checkbox" class="checkbox"></div>

        <div id="checkText" class="check-text">
          Xác nhận<br>
              bạn là con người
        </div>
      </div>

      <div class="status">
        <div id="statusIcon" class="status-icon"></div>
        Xác nhận<br>
        an toàn
      </div>

    </div>

    <div id="message" class="message">
      Vui lòng tích vào ô xác nhận bên trên.
    </div>

  </main>

  <script>
    const destinationUrl = "https://gaviet678.net";

    const checkArea = document.getElementById("checkArea");
    const checkbox = document.getElementById("checkbox");
    const checkText = document.getElementById("checkText");
    const statusIcon = document.getElementById("statusIcon");
    const message = document.getElementById("message");

    let processing = false;

    checkArea.addEventListener("click", function () {
      if (processing) return;

      processing = true;

      statusIcon.classList.add("loading");
      checkText.innerHTML = "Đang xác nhận...";
      message.textContent = "Vui lòng đợi trong giây lát.";

      setTimeout(function () {
        checkbox.classList.add("checked");
        statusIcon.classList.remove("loading");

        checkText.innerHTML = "Đã xác nhận";
        message.textContent = "Đang chuyển hướng...";

        setTimeout(function () {
          window.location.href = destinationUrl;
        }, 700);

      }, 1300);
    });
  </script>

</body>
</html>
